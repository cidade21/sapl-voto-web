services:
  - type: web
    name: sapl-voto-api
    runtime: node
    rootDir: backend
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://sapl-voto-web.onrender.com

  - type: static
    name: sapl-voto-web
    staticPublishPath: dist
    buildCommand: pnpm install && pnpm build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sapl-voto-api.onrender.com
    autoDeploy: true
